name: "20 - Main CI"
on:
  push:
    # run on pushes to main or release/*
    branches:
      - main
      - release/*
    paths-ignore:
      - '**/README.md'
      - 'terraform/**'
      - '.github/workflows/40-terraform-validate.yml'
      - 'helm-chart/**'
      - '.github/workflows/15-helm-chart-ci.yml'
      - '.github/workflows/17-kubevious-manifests-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::879381260173:role/github-actions-role' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || '879381260173.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique' }}

jobs:
  code-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      env:
        DOTNET_INSTALL_DIR: "./.dotnet"
      with:
        dotnet-version: '10.0.x'
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
    - name: Go Unit Tests
      timeout-minutes: 10
      run: |
        for SERVICE in "shippingservice" "productcatalogservice"; do
          echo "testing $SERVICE..."
          pushd src/$SERVICE
          go test
          popd
        done
    - name: C# Unit Tests
      timeout-minutes: 10
      run: |
        dotnet test src/cartservice/
  deployment-tests:
    runs-on: ubuntu-latest
    needs: code-tests
    timeout-minutes: 40
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Install Skaffold
      run: |
        curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
        sudo install skaffold /usr/local/bin/skaffold
        skaffold version
    - name: Build and Push with Skaffold
      timeout-minutes: 20
      env:
        IMAGE_REPO: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        skaffold build \
          --default-repo="${IMAGE_REPO}" \
          --tag="${IMAGE_TAG}" \
          -m app,loadgenerator \
          --push=true