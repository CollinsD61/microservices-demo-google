name: "40 - Terraform Validate"
on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/40-terraform-validate.yml'
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/40-terraform-validate.yml'
jobs:
  terraform-validate-ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: terraform init & validate
        run: |
          cd terraform/
          terraform init -backend=false
          terraform validate
