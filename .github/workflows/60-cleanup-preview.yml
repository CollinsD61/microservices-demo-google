name: "60 - Cleanup Preview"
on:
  pull_request:
    # run on pull requests targeting main
    branches:
      - main
    types: closed
    paths-ignore:
      - '**/README.md'
      - 'terraform/**'
      - '.github/workflows/40-terraform-validate.yml'
permissions:
  contents: read
  id-token: write

jobs:
  cleanup-namespace:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381260173:role/github-actions-role
          aws-region: ap-southeast-1

      - name: Configure kubectl for EKS cluster
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
        env:
          EKS_CLUSTER_NAME: online-boutique-eks
          AWS_REGION: ap-southeast-1

      - name: Delete PR namespace in EKS cluster
        if: ${{ always() }}
        timeout-minutes: 20
        run: |
          NAMESPACE="pr${PR_NUMBER}"
          kubectl delete namespace "$NAMESPACE" --ignore-not-found=true
        env:
          PR_NUMBER: ${{ github.event.number }}
