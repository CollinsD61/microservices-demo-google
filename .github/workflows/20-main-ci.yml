name: "20 - Main CI"
on:
  push:
    # run on pushes to main or release/*
    branches:
      - main
      - release/*
    paths-ignore:
      - '**/README.md'
      - 'kustomize/**'
      - '.github/workflows/16-kustomize-build-ci.yml'
      - 'terraform/**'
      - 'terraform-aws/**'
      - '.github/workflows/40-terraform-validate.yml'
      - 'helm-chart/**'
      - '.github/workflows/15-helm-chart-ci.yml'

permissions:
  contents: read
  id-token: write
jobs:
  code-tests:
    runs-on: [self-hosted, is-enabled]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      env:
        DOTNET_INSTALL_DIR: "./.dotnet"
      with:
        dotnet-version: '10.0'
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
    - name: Go Unit Tests
      timeout-minutes: 10
      run: |
        for SERVICE in "shippingservice" "productcatalogservice"; do
          echo "testing $SERVICE..."
          pushd src/$SERVICE
          go test
          popd
        done
    - name: C# Unit Tests
      timeout-minutes: 10
      run: |
        dotnet test src/cartservice/
  deployment-tests:
    runs-on: [self-hosted, is-enabled]
    needs: code-tests
    steps:
    - uses: actions/checkout@v6
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::879381260173:role/github-actions-role
        aws-region: ap-southeast-1
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build and Push to ECR
      timeout-minutes: 20
      run: |
        skaffold build \
          --default-repo=879381260173.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique \
          --tag=${{ github.sha }} \
          --push=true
