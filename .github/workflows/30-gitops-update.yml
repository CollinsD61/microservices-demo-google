name: "30 - GitOps Update"

on:
  workflow_run:
    workflows:
      - "20 - Main CI"
    types:
      - completed

permissions:
  contents: write

jobs:
  update-helm-image-tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.actor.login != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Bump Helm chart image tag
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          bash .github/scripts/bump-image-tag.sh "$IMAGE_TAG" helm-chart/values.yaml

      - name: Commit and push GitOps change
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          if git diff --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm-chart/values.yaml
          git commit -m "chore(gitops): bump helm image tag to ${IMAGE_TAG}"
          git push origin main
