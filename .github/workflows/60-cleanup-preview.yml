name: "60 - Cleanup Preview"
on:
  pull_request:
    # run on pull requests targeting main
    branches:
      - main
    types: closed
    paths-ignore:
      - '**/README.md'
      - 'terraform/**'
      - '.github/workflows/40-terraform-validate.yml'
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::879381260173:role/github-actions-role' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'online-boutique-eks' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cleanup-namespace:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS cluster
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Delete PR namespace in EKS cluster
        if: ${{ always() }}
        timeout-minutes: 20
        run: |
          NAMESPACE="pr${PR_NUMBER}"
          kubectl delete namespace "$NAMESPACE" --ignore-not-found=true
        env:
          PR_NUMBER: ${{ github.event.number }}
