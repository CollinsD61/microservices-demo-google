name: "10 - PR CI"
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'terraform/**'
      - '.github/workflows/40-terraform-validate.yml'
      - 'helm-chart/**'
      - '.github/workflows/15-helm-chart-ci.yml'
      - '.github/workflows/17-kubevious-manifests-ci.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::879381260173:role/github-actions-role' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || '879381260173.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique' }}

# Ensure this workflow only runs for the most recent commit of a pull-request
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      env:
        DOTNET_INSTALL_DIR: "./.dotnet"
      with:
        dotnet-version: '10.0.x'
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
    - name: Go Unit Tests
      timeout-minutes: 10
      run: |
        for GO_PACKAGE in "shippingservice" "productcatalogservice" "frontend/validator"; do
          echo "Testing $GO_PACKAGE..."
          pushd src/$GO_PACKAGE
          go test
          popd
        done
    - name: C# Unit Tests
      timeout-minutes: 10
      run: |
        dotnet test src/cartservice/

  deployment-tests:
    runs-on: ubuntu-latest
    needs: code-tests
    timeout-minutes: 40
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{github.event.pull_request.head.sha}}
        fetch-depth: 0
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Install Skaffold
      run: |
        curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
        sudo install skaffold /usr/local/bin/skaffold
        skaffold version
    - name: Detect Changed Services
      id: changed-services
      run: |
        git fetch origin "${{ github.base_ref }}" --depth=1
        SERVICES=$(bash .github/scripts/resolve-services.sh "origin/${{ github.base_ref }}")
        echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
        echo "Detected skaffold modules: ${SERVICES:-<none>}"
    - name: Build and Push with Skaffold
      if: ${{ steps.changed-services.outputs.services != '' }}
      timeout-minutes: 20
      env:
        IMAGE_REPO: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        skaffold build \
          --default-repo="${IMAGE_REPO}" \
          --tag="${IMAGE_TAG}" \
          -m "${{ steps.changed-services.outputs.services }}" \
          --push=true
    - name: Skip build when no service changed
      if: ${{ steps.changed-services.outputs.services == '' }}
      run: echo "No service changes in src/* detected. Skipping image build."
